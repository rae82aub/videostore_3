{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Video Store</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <header style="background-color:#1d48e6; color:white; padding:12px 20px; display:flex; justify-content:space-between; align-items:center;">
        <h2 style="margin:0;">
            <a href="{% url 'movies:movie_list' %}" style="color:white; text-decoration:none;">My Video Store</a>
        </h2>
        <a href="{% url 'movies:movie_create' %}" style="background-color:white; color:#1d48e6; padding:6px 10px; text-decoration:none; border-radius:4px;">Add Movie</a>
    </header>

    <div class="container" style="padding:20px;">
        {% if messages %}
            {% for m in messages %}
                <p style="color:green;">{{ m }}</p>
            {% endfor %}
        {% endif %}

        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
